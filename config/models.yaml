# LLM 모델 설정
small_model:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 1024
  temperature: 0.7
  timeout_ms: 3000

large_model:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  max_tokens: 2048
  temperature: 0.8
  timeout_ms: 10000

dmn_model:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 1024
  temperature: 0.9
  timeout_ms: 5000

# 구현 옵션 (최소/표준/풀)
call_config: "standard"
