# LLM 모델 설정 (OpenAI via LiteLLM)
# 환경변수: AGENT_OPENAI_API_KEY (런타임에 OPENAI_API_KEY로 매핑됨)
# 2026-04 출시 gpt-5.5 올인 — 4o 시리즈는 legacy.
# 주의: gpt-5.5 는 temperature 의 기본값(1.0)만 지원. 다른 값 지정 시 BadRequest.
#       그래서 temperature 키는 명시하지 않거나 1.0 으로 고정.
#
# reasoning_effort: low | medium | high
#   gpt-5.5 reasoning 모델은 generation 전 hidden thinking 단계가 있어서 effort
#   를 낮추면 그 단계가 짧아진다. 단순 분류/선택/rewrite 콜은 low, 창작/다차원
#   판단은 medium 이상으로. 호출부에서 reasoning_effort 인자로 per-call override
#   가능 (LLMClient.complete_json 참고). 주의: gpt-5.5 는 'minimal' 미지원
#   (litellm UnsupportedParamsError) — 'low' 가 최소값.
small_model:
  provider: "openai"
  model: "gpt-5.5"
  max_tokens: 1024
  temperature: 1.0
  reasoning_effort: low
  timeout_ms: 12000

large_model:
  provider: "openai"
  model: "gpt-5.5"
  max_tokens: 2048
  temperature: 1.0
  reasoning_effort: medium
  timeout_ms: 25000

dmn_model:
  provider: "openai"
  model: "gpt-5.5"
  max_tokens: 1024
  temperature: 1.0
  reasoning_effort: low
  timeout_ms: 15000

# stream_model: judge_finalize.stream_text 전용 — non-reasoning 모드.
#   gpt-5.5 의 reasoning_effort='none' 이 non-reasoning 모드. OpenAI 가
#   "latency-critical tasks (light voice turns, fast retrieval, classification)"
#   용으로 명시한 옵션. thinking phase 없이 stream 즉시 시작 → 첫 토큰 ~200ms.
#   단순 톤 정렬 rewrite 작업이라 reasoning 불필요.
#   별도 model ID (gpt-5.5-chat-latest) 가 있는 게 아니라 같은 gpt-5.5 에
#   파라미터로 분기 — 이전 명명은 오해였음 (litellm.NotFoundError).
stream_model:
  provider: "openai"
  model: "gpt-5.5"
  max_tokens: 512
  temperature: 1.0
  # 따옴표 필수 — YAML 의 unquoted none/Null 은 Python None 으로 파싱되어
  # reasoning_effort 키 자체가 안 보내져 모델 default(=medium) reasoning 발동.
  reasoning_effort: "none"
  timeout_ms: 10000

# 구현 옵션 (최소/표준/풀)
call_config: "standard"
