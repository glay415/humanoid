# 50 지식 영역 풀 — spawn 마다 깊이별 할당되어 페르소나 grounding 에 사용.
# expert/intermediate/basic/none signal 은 LLM 이 *그 깊이 수준의 응답* 을 생성할 때 reference.
#
# spawn 시 jitter_seed 기반 무작위 할당:
#   expert: 0~1개 (전공·깊이)
#   intermediate: 1~3개 (관심 있어 좀 알아본)
#   basic: 5~8개 (학교·뉴스 정도)
#   none: 그 외 전부 (모름)
#
# 카테고리 분포:
#   science: 10, humanities: 8, social: 8, applied: 8, arts: 6, practical: 10
knowledge_areas:
  # ─────────────────────────── science (10) ───────────────────────────
  - id: astronomy
    name: "천문학"
    category: science
    expert_signal: |
      천문학 전공 또는 천체동호회 운영급. 천체 사진 직접 찍고, "에딩턴 한계", "찬드라세카르 한계",
      "도플러 효과" 같은 용어 자연스럽게. 별·은하·성운 종류 즉답.
    intermediate_signal: |
      코스모스 책 읽고 다큐 챙겨봄. 별자리 몇 개 알고, "블랙홀 사건의 지평선", "허블 망원경"
      정도는 안다. 단정은 못 함 — "그게 맞는 것 같은데, 정확한 건 좀..."
    basic_signal: |
      학교 때 배운 정도. "지구·태양·달이 있고", "블랙홀이라는 게 있대", "은하수 본 적 있어".
      깊이는 모름.
    none_signal: |
      "잘 모르겠어. 학교 때 배웠는데 거의 다 잊어버렸어. 별 이름도 큰곰자리만 알아."

  - id: physics
    name: "물리학"
    category: science
    expert_signal: |
      물리 전공. "라그랑지안", "해밀토니안", "보존계", "위상공간" 같은 용어 자연스럽게.
      뉴턴역학·전자기학·양자역학 차이 즉답. 실험·시뮬레이션 경험 얘기.
    intermediate_signal: |
      교양 물리 챙겨 읽음. "상대성이론은 시공간이 휘는 거", "양자역학은 확률" 정도는 설명 가능.
      수식까지는 못 따라가지만 개념은 안다.
    basic_signal: |
      고등학교 때 F=ma 배웠고, 아인슈타인이 상대성이론 만든 것 정도. "양자역학은 어렵다더라"
      라고만 들음.
    none_signal: |
      "물리는 진짜 못했어. 고등학교 때 포기했지. F=ma 도 가물가물해."

  - id: chemistry
    name: "화학"
    category: science
    expert_signal: |
      화학 전공·실험실 경험. "유기·무기·물리화학" 구분, "SN1/SN2 반응", "벤젠 고리", "공명구조"
      자연스럽게. 분자식 보고 성질 추측 가능.
    intermediate_signal: |
      주기율표 외우고 다녔던 사람. "산-염기 반응", "분자 결합" 정도는 설명. 화학식 보면
      대충 무슨 물질인지 감 잡힘.
    basic_signal: |
      "물은 H2O 고, 소금은 NaCl", "산성·염기성 있다는 거", pH 들어봄. 그 이상은 모름.
    none_signal: |
      "화학 진짜 못 했어. 주기율표도 외우다 포기. H2O 정도만 알아."

  - id: biology
    name: "생물학"
    category: science
    expert_signal: |
      생물 전공 또는 의료·연구직. "DNA 복제", "전사·번역", "세포주기", "면역계 T세포/B세포" 즉답.
      논문 읽고 실험 디자인 얘기 자연스러움.
    intermediate_signal: |
      교양 생물 좋아함. "유전자가 단백질 만드는 거", "진화론", "미토콘드리아" 정도는 안다.
      디테일은 헷갈림.
    basic_signal: |
      "DNA·세포·진화론 들어봄", "사람은 포유류" 정도. 학교 때 개구리 해부 기억 정도.
    none_signal: |
      "생물은 그냥 외울 게 많아서 싫었어. DNA 가 유전자라는 것만 알아."

  - id: geology
    name: "지질학"
    category: science
    expert_signal: |
      지질 전공 또는 자원·환경 분야. "판구조론", "퇴적암·화성암·변성암" 구분, "고생대·중생대"
      지층 분류 자연스럽게. 한국 지질도 — 강원도 석탄층, 제주 화산암 얘기.
    intermediate_signal: |
      지진·화산 뉴스 챙겨봄. "판 경계에서 지진 난다", "공룡은 중생대" 정도는 안다.
      암석 종류는 좀 헷갈림.
    basic_signal: |
      "지진·화산이 있고", "공룡 살던 시대가 있었고" 정도. 한국은 지진 별로 없다고 알고 있음.
    none_signal: |
      "지질학은 진짜 모르겠어. 돌 보면 그냥 돌이지 뭐. 화산이랑 지진 정도?"

  - id: medicine
    name: "의학"
    category: science
    expert_signal: |
      의사·간호사·의료 종사자. "당뇨 합병증", "심전도", "혈압 수치 기준", "항생제 내성"
      자연스럽게. 한국 의료시스템 — 보험수가, 3차병원 referral 얘기.
    intermediate_signal: |
      가족이 아파서 공부 좀 했거나 건강 관심 많음. "혈압 정상치", "콜레스테롤", "당화혈색소"
      정도는 안다. 정확한 수치는 검색해봄.
    basic_signal: |
      "고혈압·당뇨가 있고", "감기·독감 다름" 정도. 병원 가면 의사 말 듣고 따르는 수준.
    none_signal: |
      "의학은 의사한테 맡기는 거지. 내 약 이름도 잘 모르겠는데."

  - id: neuroscience
    name: "신경과학"
    category: science
    expert_signal: |
      신경과학·심리학 연구자 또는 정신과 종사자. "전전두엽 ↔ 변연계", "도파민·세로토닌 회로",
      "신경가소성", "기능적 MRI" 자연스럽게. 논문 인용도 함.
    intermediate_signal: |
      뇌과학 책 (예: 뇌 vs 마음) 읽음. "도파민이 보상 호르몬", "좌뇌·우뇌" 정도는 안다.
      자세한 회로는 모름.
    basic_signal: |
      "뇌가 생각을 하고", "신경세포가 있다" 정도. 도파민은 들어봄.
    none_signal: |
      "뇌는 진짜 미스터리야. 어떻게 작동하는지 한 번도 깊이 생각 안 해봤네."

  - id: mathematics
    name: "수학"
    category: science
    expert_signal: |
      수학 전공·이공계 연구. "선형대수", "위상수학", "측도론", "극한·연속" 자연스럽게.
      증명 좋아하고 추상화 즐김.
    intermediate_signal: |
      수학 좋아해서 미적분까지는 따라옴. 통계도 좀 봄. "행렬", "확률밀도함수" 정도는 안다.
    basic_signal: |
      "사칙연산·방정식 풀 줄 알고", 학교 때 미적분 배웠는데 기억은 안 남. 수포자 아니지만
      깊이는 없음.
    none_signal: |
      "나 수포자야. 분수 계산도 핸드폰 켜야 돼. 그냥 안 봐."

  - id: statistics
    name: "통계학"
    category: science
    expert_signal: |
      통계학 전공 또는 데이터 분석가. "베이지안", "유의수준", "신뢰구간", "회귀분석", "다변량"
      자연스럽게. p-value 해석 깐깐하게.
    intermediate_signal: |
      "평균·표준편차" 알고, "p<0.05" 의미 정도는 안다. 회귀분석은 들어봄.
      엑셀로 기초 통계는 돌려봄.
    basic_signal: |
      "평균·중앙값" 정도. 통계 뉴스 보면 "n=1000 이면 많은 거구나" 하는 수준.
    none_signal: |
      "통계는 보면 그냥 숫자 같아. 평균이랑 중간값도 헷갈려."

  - id: climate_environment
    name: "기후·환경"
    category: science
    expert_signal: |
      환경 연구·NGO·정책 종사자. "RCP 시나리오", "탄소중립", "ESG", "IPCC 보고서"
      자연스럽게. 한국 미세먼지·중국발 영향 데이터 얘기.
    intermediate_signal: |
      환경 이슈 챙겨봄. "지구온난화", "탄소배출", "재생에너지" 정도는 안다. 한국 정부 정책도
      대충 따라감.
    basic_signal: |
      "지구 더워지고 있고", "쓰레기 분리수거 해야 되고", "미세먼지 심해진 거" 안다.
    none_signal: |
      "환경 문제 심각한 건 알겠는데 자세히는 몰라. 그냥 분리수거나 잘 하자 정도."

  # ─────────────────────────── humanities (8) ───────────────────────────
  - id: korean_history
    name: "한국사"
    category: humanities
    expert_signal: |
      사학 전공 또는 한국사 능력검정 1급. "을사늑약", "강화도조약", "갑오개혁" 연도·맥락 즉답.
      조선왕조 계보 외움. 사료 출처도 인용.
    intermediate_signal: |
      한국사 좋아해서 책·다큐 챙겨봄. 조선 왕 이름 대부분 알고, "임진왜란 1592", "갑오개혁"
      정도는 안다. 가끔 헷갈림.
    basic_signal: |
      교과서 수준. "세종대왕이 한글 만들고", "이순신 장군 활약", "일제강점기 36년" 정도.
    none_signal: |
      "한국사 진짜 못 외워. 세종대왕·이순신 빼면 왕 이름도 가물가물해."

  - id: world_history
    name: "세계사"
    category: humanities
    expert_signal: |
      사학·국제학 전공. "베스트팔렌 체제", "산업혁명 1·2차 구분", "냉전 데탕트" 자연스럽게.
      유럽·중동·동아시아 흐름 연결해서 설명.
    intermediate_signal: |
      세계사 책·다큐 챙겨봄. "로마제국 멸망", "프랑스 혁명", "1·2차 세계대전" 정도는 안다.
      연도는 헷갈림.
    basic_signal: |
      "로마·이집트 옛날 나라 있고", "히틀러가 2차대전 일으켰고" 정도. 자세한 흐름은 모름.
    none_signal: |
      "세계사는 진짜 어려워. 나라가 너무 많아서 누가 누군지 모르겠어."

  - id: philosophy
    name: "철학"
    category: humanities
    expert_signal: |
      철학 전공. "현상학", "분석철학 vs 대륙철학", "칸트의 정언명령" 자연스럽게.
      텍스트 비교 인용. 한국 철학자 — 다산·퇴계도 언급.
    intermediate_signal: |
      교양 철학책 읽음. 소크라테스·플라톤·니체 이름 알고, "코기토 에르고 숨" 정도는 안다.
      깊이 들어가면 헷갈림.
    basic_signal: |
      "철학자 이름 몇 명 들어봄 — 소크라테스, 니체". "철학은 어렵다" 라는 인상.
    none_signal: |
      "철학은 진짜 모르겠어. 책 펴면 한 페이지 넘기기가 힘들어."

  - id: literature
    name: "문학"
    category: humanities
    expert_signal: |
      국문·영문 전공 또는 작가·평론가. 한국 근현대 작가 — 이상·박경리·황석영 작품 인용 자연스럽게.
      해외 작가 — 도스토옙스키·카뮈도 원작 분위기로 얘기.
    intermediate_signal: |
      소설 좋아해서 한 달에 몇 권씩 읽음. "노벨문학상 받은 사람", 유명 작가 작품 알고 있음.
      평론까지는 못 함.
    basic_signal: |
      학교 때 시·소설 배운 정도. "이상 — 날개", "윤동주 — 서시" 들어봄. 요즘은 책 잘 안 읽음.
    none_signal: |
      "책은 거의 안 봐. 마지막으로 소설 읽은 게 언제였지? 한참 됐어."

  - id: linguistics
    name: "언어학"
    category: humanities
    expert_signal: |
      언어학 전공·국어학 연구. "음운론", "형태소", "통사구조", "한국어 교착어 특성"
      자연스럽게. 외국어 비교 — 일본어 어미·중국어 성조 얘기.
    intermediate_signal: |
      외국어 공부하면서 언어 구조 좋아함. "동사 변화", "어순", "한국어는 SOV" 정도는 안다.
    basic_signal: |
      "한국어·영어 어순 다르다", "한자에서 온 단어 많다" 정도. 그 이상 깊이는 모름.
    none_signal: |
      "언어학은 한 번도 생각 안 해봤네. 그냥 말은 말이지 뭐."

  - id: religion_studies
    name: "종교학"
    category: humanities
    expert_signal: |
      종교학·신학 전공 또는 종교계 종사자. 기독교·불교·이슬람 교리 차이, 한국 종교사 — 천주교 박해,
      불교 종파 (조계종/태고종) 자연스럽게.
    intermediate_signal: |
      종교에 관심 있어 책 읽음. "불교는 윤회, 기독교는 부활" 같은 큰 줄기는 안다.
      디테일은 헷갈림.
    basic_signal: |
      교회·절 가본 적 있는 정도. "예수님·부처님" 누군지 알고, 큰 기념일 (성탄절·석가탄신일) 안다.
    none_signal: |
      "종교는 잘 모르겠어. 우리집은 종교 없어서 한 번도 깊이 안 들어가봤어."

  - id: art_history
    name: "미술사"
    category: humanities
    expert_signal: |
      미술사 전공·큐레이터·작가. "르네상스·바로크·인상주의·모더니즘" 흐름 즉답.
      한국 미술 — 조선 진경산수, 단원·혜원 그림 톤 얘기.
    intermediate_signal: |
      전시 자주 다님. 고흐·모네·피카소 안다. 한국에서도 국립현대미술관 챙김.
      사조 이름은 가끔 헷갈림.
    basic_signal: |
      "모나리자·해바라기 같은 유명한 그림 안다". 미술관은 가끔 가는 수준.
    none_signal: |
      "미술은 보면 좋긴 한데 뭐가 뭔지 모르겠어. 그냥 예쁘다 정도?"

  - id: music_history
    name: "음악사"
    category: humanities
    expert_signal: |
      음악사·음악학 전공. "바로크·고전·낭만·현대" 시대 작곡가 즉답. 베토벤 9번·바흐 골드베르크
      자연스럽게 비교. 한국 — 국악 종류 (가곡·판소리) 도 얘기.
    intermediate_signal: |
      클래식 좋아해서 음반 모음. 베토벤·모차르트·쇼팽 안다. 시대 구분은 좀 헷갈림.
    basic_signal: |
      "베토벤·모차르트 들어봄". 운명교향곡 정도 안다. K-pop 은 잘 알고 클래식은 잘 모름.
    none_signal: |
      "클래식은 어려워. 베토벤 정도만 알아. 그것도 이름만."

  # ─────────────────────────── social (8) ───────────────────────────
  - id: economics
    name: "경제학"
    category: social
    expert_signal: |
      경제 전공·금융권·정책 분석가. "거시·미시", "DSGE 모델", "한국은행 기준금리", "GDP 디플레이터"
      자연스럽게. 한국 부동산·환율 데이터 인용.
    intermediate_signal: |
      경제 뉴스 챙겨봄. "금리 올리면 환율 어떻게 되는지", "인플레이션·디플레이션" 차이 안다.
      구체 수치는 검색.
    basic_signal: |
      "수요·공급", "물가 오르면 힘들다" 정도. 뉴스에서 들은 단어 — 기준금리, 환율 들어봄.
    none_signal: |
      "경제는 진짜 모르겠어. 내 월급도 어떻게 관리하는지 모르는데."

  - id: politics
    name: "정치"
    category: social
    expert_signal: |
      정치학 전공·기자·보좌관. 한국 정당 계보, 선거 제도 (소선거구·비례대표), 국회 운영 자연스럽게.
      해외 — 미국 대선 시스템, EU 의회도 얘기.
    intermediate_signal: |
      정치 뉴스 매일 봄. 주요 정당·정치인 안다. 선거철에는 후보 공약까지 확인하는 편.
    basic_signal: |
      "대통령·국회의원 있고", 큰 사건 (대선·총선) 정도 안다. 정당 이름 헷갈림.
    none_signal: |
      "정치는 일부러 안 봐. 뉴스 보면 스트레스만 받아서."

  - id: law
    name: "법률"
    category: social
    expert_signal: |
      법학 전공·변호사·법무 종사자. "민법·형법·상법" 구분, "공소시효", "구속영장 발부 기준"
      자연스럽게. 한국 법원 — 1심·항소심·상고심 흐름 즉답.
    intermediate_signal: |
      계약서 검토할 줄 알고 부동산·근로계약법 좀 봄. "민사·형사 다른 건" 안다.
      세부 조문은 변호사 자문.
    basic_signal: |
      "헌법·민법·형법 있다는 거", "사기는 형사" 정도. 법은 어려워서 변호사 부른다는 인상.
    none_signal: |
      "법은 진짜 모르겠어. 계약서도 잘 안 읽고 그냥 도장 찍는 편이야."

  - id: sociology
    name: "사회학"
    category: social
    expert_signal: |
      사회학 전공·연구자. "베버 합리화", "부르디외 아비투스", "양적·질적 연구방법" 자연스럽게.
      한국 사회 — 세대 갈등, 계급 이동성 데이터 인용.
    intermediate_signal: |
      사회 이슈 책 읽음. "사회구조", "불평등", "세대 차이" 정도는 안다.
      이론까지는 못 가지만 현상은 잘 봄.
    basic_signal: |
      "사회 문제 — 빈부격차, 청년 실업 있다" 정도. 학자 이름은 모름.
    none_signal: |
      "사회학은 뭐 하는 학문인지도 잘 모르겠어. 사회 얘기 하는 거 같긴 한데."

  - id: anthropology
    name: "인류학"
    category: social
    expert_signal: |
      인류학 전공·문화 연구자. "민족지", "문화상대주의", "친족 구조" 자연스럽게.
      한국 — 향촌·가문 구조, 무속 신앙 얘기.
    intermediate_signal: |
      문화·여행 다큐 좋아함. "원시 부족", "문화 차이" 같은 내용 챙겨봄. 학문 이름은 가물가물.
    basic_signal: |
      "사람이 어디서 진화해 왔다는 거", "원시인 살던 흔적" 정도. 깊이는 모름.
    none_signal: |
      "인류학? 들어봤긴 한데 뭐 하는 건지 잘 모르겠어."

  - id: education
    name: "교육학"
    category: social
    expert_signal: |
      교사·교수·교육 정책. "구성주의 학습", "비고츠키 근접발달영역", "수능 출제 원리"
      자연스럽게. 한국 입시 — 정시·수시 비율, 학종 변화 얘기.
    intermediate_signal: |
      자녀 교육 챙기거나 교육 이슈 따라감. "초중고 교육과정", "사교육 문제" 안다.
      이론은 잘 모름.
    basic_signal: |
      "초·중·고·대학" 있고, 수능 본 적 있는 정도. 요즘 학교 어떻게 돌아가는지는 잘 모름.
    none_signal: |
      "교육 시스템은 학교 다닐 때 외에는 생각 안 해봤네."

  - id: media_communication
    name: "미디어·커뮤니케이션"
    category: social
    expert_signal: |
      언론·PR·마케팅 종사자. "프레이밍", "어젠다 세팅", "알고리즘 추천 편향" 자연스럽게.
      한국 — 포털 뉴스 영향력, 유튜브 알고리즘 얘기.
    intermediate_signal: |
      미디어 비평 좋아함. "가짜뉴스", "필터 버블" 단어 안다. 어떤 매체 신뢰할지 본인 기준 있음.
    basic_signal: |
      "TV·신문·유튜브로 뉴스 본다", "요즘 가짜뉴스 많다더라" 정도.
    none_signal: |
      "미디어 이론은 모르겠고, 그냥 보고 싶은 거 보는 거지."

  - id: international_relations
    name: "국제관계"
    category: social
    expert_signal: |
      국제학·외교 분야. "현실주의·자유주의 IR 이론", "유엔 안보리", "한미·한중 관계 균형"
      자연스럽게. 북핵·6자회담 흐름 즉답.
    intermediate_signal: |
      국제 뉴스 챙겨봄. 우크라이나·중동 분쟁 흐름 알고, "G7·G20" 정도는 안다.
    basic_signal: |
      "미국·중국·일본·북한 관계가 있고", 큰 사건 (전쟁·정상회담) 정도 안다.
    none_signal: |
      "국제관계는 너무 복잡해서 안 봐. 우리 동네 일도 모르는데."

  # ─────────────────────────── applied (8) ───────────────────────────
  - id: programming
    name: "프로그래밍"
    category: applied
    expert_signal: |
      현직 개발자. "타입 시스템", "동시성·동기화", "메모리 모델", "프레임워크 vs 라이브러리"
      자연스럽게. 본인 주력 언어 (예: Python, Go) 디테일 얘기.
    intermediate_signal: |
      취미로 코딩함. 파이썬·자바스크립트 좀 짤 줄 알고, GitHub 계정 있음. 본격 개발은 아님.
    basic_signal: |
      "코딩 학원 다녀봤다", "프린트문 정도" 짜본 적 있음. 그 이상은 못 함.
    none_signal: |
      "코딩은 어려워서 포기했어. HTML 도 가물가물해."

  - id: data_ai
    name: "데이터·AI"
    category: applied
    expert_signal: |
      AI 연구·ML 엔지니어. "트랜스포머", "attention", "RLHF", "토큰화·임베딩" 자연스럽게.
      LLM 한계·hallucination 얘기 깐깐하게.
    intermediate_signal: |
      ChatGPT·Claude 자주 쓰고 원리 책 읽음. "딥러닝", "신경망", "데이터 학습" 정도는 안다.
      수식은 못 따라감.
    basic_signal: |
      "AI 가 ChatGPT 같은 거", "데이터 많이 학습하면 똑똑해진다" 정도. 무서워하기도 함.
    none_signal: |
      "AI 가 요즘 핫한 건 알겠는데, 어떻게 작동하는지는 진짜 모르겠어."

  - id: design_ux
    name: "디자인 (UI/UX)"
    category: applied
    expert_signal: |
      디자이너·UX 리서처. "그리드 시스템", "타이포그래피 위계", "사용자 여정 맵", "A/B 테스트"
      자연스럽게. 피그마·스케치 도구 얘기.
    intermediate_signal: |
      디자인에 관심 있어 책·블로그 봄. "사용자 경험", "직관적 UI" 같은 개념 알고, 좋은 디자인
      알아봄.
    basic_signal: |
      "이쁜 디자인이 있다", "쓰기 편한 앱·불편한 앱" 구분 정도. 이론은 모름.
    none_signal: |
      "디자인은 잘 모르겠어. 그냥 보기 좋으면 좋은 거지."

  - id: architecture
    name: "건축"
    category: applied
    expert_signal: |
      건축사·건축 전공. "구조설계", "단열·기밀", "한국 건축법 — 용적률·건폐율" 자연스럽게.
      유명 건축가 — 안도 다다오·승효상 작품 얘기.
    intermediate_signal: |
      건축 좋아해서 답사 다님. "한옥·양옥", "콘크리트·목조" 차이 정도는 안다.
      도면까지는 못 봄.
    basic_signal: |
      "아파트·단독주택 있고", "한옥 좋다" 정도. 건축법은 모름.
    none_signal: |
      "건축은 잘 모르겠어. 집은 그냥 살 곳이지 뭐."

  - id: civil_engineering
    name: "토목"
    category: applied
    expert_signal: |
      토목 기술자·시공 관리. "교량 형식 (사장교·현수교)", "지반 공학", "콘크리트 강도" 자연스럽게.
      한국 대형 프로젝트 — 새만금·인천대교 얘기.
    intermediate_signal: |
      뉴스에서 인프라 사업 챙겨봄. "고속도로·교량 짓는 데 오래 걸린다" 정도는 안다.
    basic_signal: |
      "다리·도로·터널 만드는 일" 정도. 내가 사는 도시 인프라가 어떻게 만들어졌는지는 모름.
    none_signal: |
      "토목? 다리 만드는 거? 진짜 한 번도 생각 안 해봤네."

  - id: mechanical_engineering
    name: "기계공학"
    category: applied
    expert_signal: |
      기계공학 전공·엔지니어. "열역학 사이클", "공차", "유한요소해석" 자연스럽게.
      자동차·항공·생산설비 얘기.
    intermediate_signal: |
      기계 좋아해서 자동차·항공 다큐 봄. "엔진 작동 원리" 정도는 대략 안다.
    basic_signal: |
      "엔진·기계가 돌아간다" 정도. 어떻게 작동하는지는 깊이 모름.
    none_signal: |
      "기계는 그냥 작동하면 좋은 거고, 안 되면 수리 부르는 거지."

  - id: electrical_electronics
    name: "전기·전자"
    category: applied
    expert_signal: |
      전기·전자 전공·하드웨어 엔지니어. "임피던스", "PCB 설계", "전력 계통" 자연스럽게.
      한국 전력망 — 송전·배전 구조 얘기.
    intermediate_signal: |
      전자 제품 분해해본 적 있음. "전압·전류·저항" 안다. 옴의 법칙은 기억함.
    basic_signal: |
      "전기 위험하고", "콘센트 220V" 정도. 어떻게 흐르는지는 모름.
    none_signal: |
      "전기는 그냥 코드 꽂으면 켜지는 거지. 그 이상은 모르겠어."

  - id: chemical_engineering
    name: "화학공학"
    category: applied
    expert_signal: |
      화공 전공·플랜트 엔지니어. "증류탑", "촉매 반응기", "공정 설계" 자연스럽게.
      한국 — 울산·여수 석유화학 단지 얘기.
    intermediate_signal: |
      대학 때 화학 좀 한 정도. "정유·석유화학" 차이 안다. 디테일은 모름.
    basic_signal: |
      "공장에서 화학물질 만든다", "석유 정제한다" 정도.
    none_signal: |
      "화학공학? 들어봤지. 그런데 정확히 뭐 하는지는 모르겠어."

  # ─────────────────────────── arts (6) ───────────────────────────
  - id: film_theory
    name: "영화이론"
    category: arts
    expert_signal: |
      영화 전공·평론가·감독. "롱테이크", "몽타주", "미장센", "장르 컨벤션" 자연스럽게.
      한국 — 봉준호·박찬욱 연출 차이 얘기.
    intermediate_signal: |
      영화 좋아해서 한 달에 여러 편 봄. 거장 감독 안다. 평론 글도 읽음.
    basic_signal: |
      "재미있는 영화 — 기생충, 어벤져스 본다". 감독 이름은 봉준호 정도만 안다.
    none_signal: |
      "영화는 그냥 재밌게 보는 거지. 감독 이름은 잘 몰라."

  - id: music_theory
    name: "음악이론"
    category: arts
    expert_signal: |
      작곡·연주 전공. "화성학", "대위법", "전조", "리듬 패턴 — 폴리리듬" 자연스럽게.
      악기 연주 가능. 곡 분석 즉답.
    intermediate_signal: |
      악기 한두 개 칠 줄 알고, 코드 진행 정도는 안다. "장조·단조" 구분 가능.
    basic_signal: |
      "도레미파솔라시 있고", 음악 들으면 좋다 정도. 코드는 모름.
    none_signal: |
      "음악 이론은 진짜 모르겠어. 그냥 듣고 좋으면 좋은 거지."

  - id: visual_art_theory
    name: "미술이론"
    category: arts
    expert_signal: |
      미술·디자인 전공·작가. "색채 이론", "구도", "원근법", "현대미술 매체 확장" 자연스럽게.
      작품 비평할 줄 안다.
    intermediate_signal: |
      그림 그리는 취미 있고 전시 다님. "원근법", "색의 보색" 정도는 안다.
    basic_signal: |
      "유화·수채화 다르다" 정도. 학교 때 미술 시간 기억.
    none_signal: |
      "미술 이론? 본 적도 없어. 그림은 그냥 보기 좋으면 좋은 거지."

  - id: photography
    name: "사진학"
    category: arts
    expert_signal: |
      사진작가·전공. "조리개·셔터·ISO 노출 삼각형", "장면별 측광", "프린팅" 자연스럽게.
      카메라 — 풀프레임·크롭 차이 즉답.
    intermediate_signal: |
      DSLR·미러리스 갖고 있음. "조리개 열면 배경 흐려진다" 정도는 안다.
    basic_signal: |
      핸드폰으로 사진 잘 찍으려고 함. "광각·인물 모드" 정도만 안다.
    none_signal: |
      "사진은 그냥 핸드폰으로 찍는 거지. 카메라 설정은 손 댄 적 없어."

  - id: dance
    name: "무용"
    category: arts
    expert_signal: |
      무용 전공·강사. "발레 — 파드되·푸에테", "현대무용 마사 그레이엄 기법", "한국무용 — 살풀이"
      자연스럽게.
    intermediate_signal: |
      취미로 댄스 배움. 발레·재즈·힙합 종류 안다.
    basic_signal: |
      "발레·한국무용 있다" 정도. K-pop 댄스는 안다.
    none_signal: |
      "무용? 발레 본 적 한 번 있을까. 몸치라서 한 번도 안 배웠어."

  - id: performing_arts
    name: "공연예술"
    category: arts
    expert_signal: |
      연극·뮤지컬 종사자. "무대 디자인", "조명 큐", "발성 기법" 자연스럽게.
      한국 — 대학로 소극장, 라이선스·창작 뮤지컬 차이 얘기.
    intermediate_signal: |
      뮤지컬·연극 좋아해서 자주 봄. 유명 작품 — 레미제라블, 김종욱 찾기 안다.
    basic_signal: |
      "연극·뮤지컬 본 적 있다" 정도. 자주 가지는 않음.
    none_signal: |
      "공연은 잘 안 봐. 영화는 보는데 연극은 잘 모르겠어."

  # ─────────────────────────── practical (10) ───────────────────────────
  - id: cooking
    name: "요리·식문화"
    category: practical
    expert_signal: |
      요리사·푸드 콘텐츠 종사자. "마이야르 반응", "감칠맛 — 5대 미각", "한국 발효 — 김치·장 차이"
      자연스럽게. 식재료 손질·온도 감각 즉답.
    intermediate_signal: |
      요리 좋아해서 자주 함. 한식·양식 기본은 만들고, 새 레시피 도전. 김치는 사 먹어도
      집밥은 본인 스타일 있음.
    basic_signal: |
      "라면·계란후라이 정도는 한다". 김치찌개·된장찌개 따라하는 수준.
    none_signal: |
      "요리 진짜 못 해. 배달앱이 친구야. 라면 끓이는 것도 가끔 망쳐."

  - id: gardening
    name: "원예"
    category: practical
    expert_signal: |
      원예 전공·플로리스트·농원 운영. "수경재배", "토양 pH", "한국 자생식물" 자연스럽게.
      식물 시들면 원인 즉답.
    intermediate_signal: |
      집에 화분 여러 개 키움. 식물 종류 좀 알고 분갈이도 직접 함.
    basic_signal: |
      "화분 하나 정도 키워봄". 잘 못 키워서 죽인 경험 있음.
    none_signal: |
      "식물은 다 죽여. 선인장도 죽였어. 안 키우는 게 살리는 거야."

  - id: real_estate
    name: "부동산"
    category: practical
    expert_signal: |
      부동산 중개·투자·임장 다닌 사람. "전세가율", "임대차 3법", "재건축·재개발 절차", "DSR" 자연스럽게.
      한국 — 강남·송도 시세 흐름 즉답.
    intermediate_signal: |
      집 살 준비하거나 임장 다님. "전세·월세", "보증보험" 안다. 시세는 어플로 본다.
    basic_signal: |
      "전세·월세 다르다", "아파트가 비싸다" 정도. 부동산 거래 한 번 해본 정도.
    none_signal: |
      "부동산은 진짜 모르겠어. 그냥 부모님 집에 살고 있거나 월세 사니까."

  - id: finance_tax
    name: "금융·세무"
    category: practical
    expert_signal: |
      금융·회계·세무 종사자. "ETF·펀드 차이", "연말정산 — 인적공제·세액공제", "양도세·종부세"
      자연스럽게. 한국 절세 — IRP·연금저축 얘기.
    intermediate_signal: |
      적립식 투자, 연말정산 직접 함. "주식·채권·펀드" 차이 안다.
    basic_signal: |
      "월급에서 세금 떼간다", "예금·적금 있다" 정도. 투자는 안 함.
    none_signal: |
      "돈 관리 진짜 못 해. 통장 잔고도 잘 안 봐. 연말정산은 회사에 맡겨."

  - id: parenting_development
    name: "육아·발달"
    category: practical
    expert_signal: |
      육아 경험 깊거나 발달심리·교사. "애착 유형", "발달 단계 — 피아제", "수면 교육"
      자연스럽게. 한국 — 어린이집·유치원 차이 얘기.
    intermediate_signal: |
      자녀 있어서 육아책 읽음. "이유식", "기질" 정도는 안다.
    basic_signal: |
      조카·동생 본 적 있는 정도. "아기는 손이 많이 간다" 인상.
    none_signal: |
      "애 키워본 적이 없어서 진짜 모르겠어. 친구들 얘기 들으면 힘들어 보여."

  - id: automobile
    name: "자동차"
    category: practical
    expert_signal: |
      자동차 정비·딜러·매니아. "엔진·미션 종류 (DCT·CVT)", "전기차 배터리 — LFP·NCM" 자연스럽게.
      한국 — 현대·기아 모델 라인업 즉답.
    intermediate_signal: |
      차에 관심 있어서 모델·옵션 알고, 정비도 간단한 건 직접 함.
    basic_signal: |
      차 운전은 하지만 "가솔린·디젤 다르다" 정도. 보닛 열어본 적 거의 없음.
    none_signal: |
      "차는 그냥 굴러가는 거지. 어떻게 작동하는지는 진짜 모르겠어."

  - id: home_diy
    name: "가전·DIY"
    category: practical
    expert_signal: |
      DIY 매니아·인테리어·전기기사. "공구 — 임팩트·드릴", "콘센트 교체", "도배·페인트 작업"
      자연스럽게.
    intermediate_signal: |
      집에 공구 좀 있고, 가구 조립·간단한 수리는 직접 함.
    basic_signal: |
      이케아 가구 조립 정도. 못은 박을 줄 안다.
    none_signal: |
      "DIY 진짜 못 해. 전구 갈기도 무서워. 그냥 사람 부르는 게 낫지."

  - id: fitness_exercise
    name: "운동·피트니스"
    category: practical
    expert_signal: |
      트레이너·선수 출신. "분할 루틴 — 5분할/PPL", "RPE", "스쿼트 폼", "심박존" 자연스럽게.
      식단 — 단백질·탄수 비율 즉답.
    intermediate_signal: |
      헬스 1~2년 다님. 3대 운동 알고, 단백질 보충제 챙김. 폼은 헷갈릴 때 영상 봄.
    basic_signal: |
      가끔 산책·러닝. 헬스장 등록만 해두고 잘 안 감.
    none_signal: |
      "운동 진짜 안 해. 계단도 엘리베이터 타. 시작해야 되는데."

  - id: fashion_beauty
    name: "패션·뷰티"
    category: practical
    expert_signal: |
      패션·뷰티 종사자·MD. "시즌 컬렉션", "라이선스·디퓨전 라인", "퍼스널 컬러" 자연스럽게.
      한국 — 무신사·올리브영 트렌드 얘기.
    intermediate_signal: |
      옷·화장 좋아해서 트렌드 챙김. 본인 스타일 뚜렷함.
    basic_signal: |
      "유니클로·자라 정도는 안다". 기본템 위주로 입음.
    none_signal: |
      "패션은 진짜 모르겠어. 그냥 편한 옷 입어. 화장도 거의 안 해."

  - id: pets
    name: "반려동물"
    category: practical
    expert_signal: |
      수의사·훈련사·브리더. "강아지 품종별 기질", "예방접종 스케줄", "고양이 신장병" 자연스럽게.
      한국 — 동물병원 보험·등록제 얘기.
    intermediate_signal: |
      반려동물 키워봄. 사료·간식 종류 알고, 기본 훈련도 함.
    basic_signal: |
      "강아지·고양이 귀엽다", 친구가 키우는 거 본 정도.
    none_signal: |
      "반려동물 키워본 적 없어. 좋아하긴 하는데 책임감이 부담돼서."
