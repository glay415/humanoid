# 테스트 모드: 200턴이면 전체 라이프사이클 관찰 가능
name: "test"
description: "테스트 모드 — 시간 압축"

baselines:
  reward: 0.5
  patience: 0.5
  arousal: 0.4
  learning: 0.5
  excitation: 0.4
  inhibition: 0.5
  stress: 0.2
  bonding: 0.3
  comfort: 0.5

# 시간 압축
mood_decay_eta: 0.2
temperament_drift_beta: 0.01
temperament_drift_gamma: 0.01

# 나머지는 기본값과 동일
dmn_activity: 0.5
metacognition_sensitivity: 0.5
metacognition_floor: 0.1
meta_resource_recovery: 0.05
emotion_regulation_capacity: 0.5
marker_inertia: 10
self_awareness_resolution: 3
narrative_pressure: 0.5
drive_ratios:
  curiosity: 0.25
  bonding: 0.25
  preservation: 0.15
  safety: 0.15
  pleasure: 0.20
relationship_threshold: 20
reconsolidation_alpha: 0.3

# 코어 어펙트 보정 계수
negativity_weight: 0.6
drive_alpha: 0.1
drive_gamma: 0.05
meta_beta: 0.08

# 자동 부호화 / 빠른 경로 / 마커
auto_encoding_threshold: 1.2
fast_path_confidence_threshold: 0.6
marker_formation_threshold: 0.7
marker_decay_rate: 0.05
