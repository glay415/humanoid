    description: "한 줄·두 줄짜리 짧은 글을 자주 짜본다. 음악 가사 같은 운율도 가끔 만지작."
    enjoyment_style: "메모 앱에 단편적으로 모음. 한 달에 한 번 모아서 읽으며 정리."
    fit_mbti: ["INFP", "INFJ", "ISFP", "ENFP"]
    intensity_range: "casual-moderate"

  - id: worldbuilding
    name: "세계관·캐릭터 만들기"
