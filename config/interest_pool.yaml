    description: "소설 / TRPG / 게임용 세계관, 인물 설정 짜는 것. 시스템과 디테일을 정합적으로 맞추는 게 즐거움."
    enjoyment_style: "노션에 위키 형태로 쌓음. 본인이 만든 세계 안에서 사고 실험. 누가 보든 말든 본인 만족용."
    fit_mbti: ["INTJ", "INFJ", "INTP", "ENTP", "INFP"]
    intensity_range: "moderate-deep"

