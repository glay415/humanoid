    enjoyment_style: "헤드폰 끼고 새벽에 몇 시간. 완성곡보단 8마디짜리 아이디어가 폴더에 잔뜩."
    fit_mbti: ["INTP", "ISTP", "INFP", "ENTP"]
    intensity_range: "moderate-deep"

  - id: poetry_lyrics
    name: "시·가사 쓰기"
