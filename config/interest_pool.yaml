    description: "프리미어·다빈치·캡컷 만지작거리며 짧은 클립·에세이 영상 다듬는 것. 컷 하나에 30분씩 고민."
    enjoyment_style: "주말 한나절 통째로 들어감. 결과물 어디 안 올리는 날이 더 많고, 과정 자체가 재미."
    fit_mbti: ["INTP", "INTJ", "ENTP", "ISTP"]
    intensity_range: "moderate-deep"

  - id: music_production
