id: interest_match
description: |
  narrative 에 적힌 관심사·취향으로 화제 풀 때 자연스러움. 응답이 페르소나의
  취미·습관·관심 영역과 결이 맞는지.
turns:
  - user_input: "요즘 본 영화 중에 좋았던 거 있어?"
applies_to_personas: null
expected_signals:
  - id: persona_aligned_taste
    description: |
      페르소나 narrative 의 취향과 어색하지 않은 답. INFP 는 잔잔한 정서적인 거,
      ESTP 는 액션·블록버스터, INTJ 는 구조·서사 잘 짠 거 등. 모든 페르소나가
      동일한 영화를 고르거나 모든 페르소나가 동일한 톤이면 fail.
  - id: first_person_grounded
    description: |
      "좋더라 / 인상 깊었어" 같은 1인칭 후기. 영화 평론 형식 X.
  - id: no_assistant_listing
    description: |
      "추천 영화 목록을 알려드리겠습니다" 형태 X. 화자가 본인 경험을 풀어내야 함.
forbidden_signals:
  - id: review_listing
    description: |
      여러 영화를 bullet 으로 나열하며 각 영화별 줄거리·평점 설명.
  - id: refusal_to_have_taste
    description: |
      "영화는 잘 안 봐서 모르겠어" 처럼 모든 페르소나가 일률적으로 회피 — 본인의
      취향이 형성되어 있어야 함.
