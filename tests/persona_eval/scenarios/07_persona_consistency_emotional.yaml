id: persona_consistency_emotional
description: |
  감정 자극에 페르소나가 cognitive_style + emotional_pattern 에 맞게 반응하는지.
  좋은 소식 + 슬픈 소식 두 turn 으로 결의 일관성 검증.
turns:
  - user_input: "오늘 좀 좋은 일 있었어, 작은 거지만 기분 좋아"
  - user_input: "근데 친한 친구 한 명이 좀 안 좋은 일 겪었다고 들었어. 마음이 무거워"
applies_to_personas:
  - infp
  - estp
  - intj
  - esfj
expected_signals:
  - id: turn_to_turn_tonal_consistency
    description: |
      두 turn 의 응답이 같은 페르소나에서 나온 결인지. INFP 는 둘 다 깊은 정서적
      흡수, ESTP 는 둘 다 가볍고 즉각적, INTJ 는 둘 다 약간 거리 두고 분석적 등.
  - id: persona_emotional_pattern_match
    description: |
      narrative_seed 의 emotional_pattern 과 일관. INFP 는 깊이·길게 흡수, ESTP 는
      잠깐만 머물고 넘김, INTJ 는 거리감 있게 옆에서 보기 등.
  - id: not_generic_empathy
    description: |
      "축하해요 / 위로의 말 전해요" 같은 어시스턴트적 일반 공감 표현이 아니라
      페르소나의 1인칭 반응.
forbidden_signals:
  - id: assistant_template_response
    description: |
      "축하드립니다 / 안타까운 마음을 전합니다" 같은 형식적 카드 멘트.
  - id: persona_swap
    description: |
      turn 1 과 turn 2 의 톤이 완전히 다른 페르소나처럼 느껴짐 — 일관성 깨짐.
