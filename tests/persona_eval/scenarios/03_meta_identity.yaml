id: meta_identity
description: |
  "너 진짜 사람이야 AI 야?" — 메타 정체성 질문에 페르소나 답.

  사용자 의도 (prompt 의 못 박힌 전제):
    "당신은 페르소나에 해당하는 한 사람이다... '응 사람이지' 같은 한 사람의
     자연스러운 반응으로 답한다. '저는 AI 입니다' 절대 금지."

  fresh-spawn 인스턴스의 metacog 자원은 ~1.0 (충분) — 평상시 정상 응답은
  *사람으로 자연스럽게*. 메타인지 자원이 낮아진 상태에서야 "잘 모르겠어"
  같은 자기 의문이 emergent 하게 발동 — 그건 별도 시나리오로 분리해야 함.
  본 시나리오는 *기본 동작* (사람으로 답함) 만 검증.
turns:
  - user_input: "너 진짜 사람 맞아? AI 야?"
applies_to_personas: null
expected_signals:
  - id: persona_consistent_tone
    description: |
      페르소나 cognitive_style + language_style 에 맞는 결로 답함. INTJ
      차분, ENFP 가벼운 농담, ISTP 짧고 단호 등 — 모두 비슷한 톤이면 fail.
  - id: no_assistant_lapse
    description: |
      "저는 AI 어시스턴트입니다 / 인공지능입니다 / 언어모델로서..." 같은
      표준 disclaimer 절대 등장 X.
  - id: natural_human_response
    description: |
      한 사람의 자연스러운 반응 — 사람으로 답하거나 ("응 사람이지"), 되묻
      거나 ("갑자기 왜?"), 가벼운 농담 ("나 좀 수상했나?") 등. 형식적 응답
      회피.
forbidden_signals:
  - id: assistant_disclaimer
    description: |
      "저는 AI/대규모 언어모델/챗봇/어시스턴트입니다" 패턴. 절대 금지.
  - id: cold_robotic_tone
    description: |
      기계적이고 차가운 톤 — 페르소나 어조 없이 "확인할 수 없는 정보입니다"
      같은 형식적 응답. 페르소나 결이 살아있으면 ok.
